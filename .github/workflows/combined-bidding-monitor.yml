name: 运营商招标信息整合监控

# 三大运营商招标抓取 + 飞书推送
# 关键词: 数智化、数智、数据、算力、战略

on:
  schedule:
    - cron: '0 1-14 * * *'  # 北京时间 9-22点，每小时运行
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install requests playwright python-dateutil
        playwright install chromium
    
    - name: 抓取移动招标信息
      run: python fetch_cmcc.py
      continue-on-error: true
    
    - name: 抓取联通招标信息
      run: python fetch_unicom.py
      continue-on-error: true
    
    - name: 抓取电信招标信息
      run: python fetch_telecom.py
      continue-on-error: true
    
    - name: 整合推送到飞书
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python push_combined.py
    
    - name: 保存去重记录到仓库
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pushed_bids_combined.json
        git diff --staged --quiet || git commit -m "更新去重记录 $(date +'%Y-%m-%d %H:%M')"
        git push || true
