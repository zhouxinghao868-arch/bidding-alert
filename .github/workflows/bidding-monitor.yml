name: 招标信息监控

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次（UTC时间整点）
  workflow_dispatch:  # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 缓存已推送记录
      uses: actions/cache@v4
      with:
        path: pushed_bids.json
        key: pushed-bids-${{ github.run_id }}
        restore-keys: |
          pushed-bids-
    
    - name: 安装依赖
      run: |
        pip install requests playwright python-dateutil
        playwright install chromium
    
    - name: 运行招标监控
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        FETCH_HOURS: ${{ secrets.FETCH_HOURS || '25' }}
      run: python bidding_notifier.py
    
    - name: 保存推送记录
      uses: actions/cache@v4
      with:
        path: pushed_bids.json
        key: pushed-bids-${{ github.run_id }}
